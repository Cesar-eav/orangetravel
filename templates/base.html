{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Orange Travel{% endblock %}</title>
    <!-- CSS Estilos -->
{% if debug %}
<link rel="stylesheet" href="{% static 'js/dist/assets/styles.css' %}">
{% else %}
<link rel="stylesheet" href="{% static 'js/dist/assets/styles.css' %}?v=1.1">
{% endif %}
         <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
          crossorigin="anonymous" referrerpolicy="no-referrer" />
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
        <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
</head>
<body >

    {% include 'includes/_navbar.html' %}
    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'includes/footer.html' %}
    
<a href="https://wa.me/56936584003?text=Hola,%20quiero%20información%20sobre%20tours" 
   class="whatsapp-float" 
   target="_blank" 
   rel="noopener" 
   aria-label="Contactar por WhatsApp">
    <i class="fab fa-whatsapp"></i>
</a>

{% if debug %}
        <script type="module" src="http://localhost:5173/static/src/main.js"></script>
    {% else %}
        <script type="module" src="{% static 'js/dist/assets/main.js' %}?v={% now 'U' %}"></script>
    {% endif %}
    <style>
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 30px;
            right: 30px;
            background-color: #25d366;
            color: #fff;
            border-radius: 50px;
            text-align: center;
            font-size: 36px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .whatsapp-float:hover {
            background-color: #128c7e;
            color: #fff;
        }
    </style>

</body>
</html>
