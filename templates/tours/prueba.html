{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-12">
    <h1 class="text-4xl font-black text-gray-800 mb-8">Panel de Estilos - Orage Travel</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden hover:scale-105 transition-transform duration-300">
            <div class="h-48 bg-orange-400 flex items-center justify-center text-white">
                <span class="font-bold">Imagen del Tour</span>
            </div>
            <div class="p-6">
                <span class="bg-orange-100 text-orange-600 text-xs font-bold px-3 py-1 rounded-full">FULL DAY</span>
                <h3 class="text-xl font-bold mt-2 text-gray-900">Laguna Roja</h3>
                <p class="text-gray-600 mt-2 text-sm line-clamp-2">Explora los misterios de la precordillera en la Región de Arica y Parinacota.</p>
                <button class="w-full mt-6 bg-orange-600 text-white font-bold py-3 rounded-xl hover:bg-orange-700 transition">
                    Ver Detalles
                </button>
            </div>
        </div>

        <div class="bg-blue-50 border-l-4 border-blue-500 p-6 rounded-r-xl self-start">
            <p class="text-blue-700 font-medium italic">"Probando la tipografía y los márgenes de Tailwind en Ubuntu 24."</p>
        </div>
    </div>
</div>
{% endblock %}
