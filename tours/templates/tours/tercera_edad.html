{% extends 'base.html' %}
{% load static %}

{% block title %}Tercera Edad | Orange Travel{% endblock %}

{% block content %}
<section class="resena-tercera-edad">
    <div class="resena-content md:mx-40 mx-2">
        {{ pagina.contenido|safe }}
    </div>
</section>



<script type="text/javascript">
    document.addEventListener('DOMContentLoaded', function () {
        if (typeof GLightbox !== 'undefined') {
            GLightbox({ selector: '.glightbox', loop: true });
        }
    });
</script>
{% endblock %}
