{% extends 'base.html' %}

{% block content %}
<section class="bg-white py-20 border-b border-gray-100">
    <div class="container mx-auto px-4 text-center">
        <h1 class="text-5xl font-black text-gray-900 mb-4">Tours</h1>
    </div>
</section>

<pre class="bg-black text-green-400 p-4 rounded text-xs">
    {{ tour|pprint }}
</pre>

<p>Precio Adulto: <span class="text-orange-600">${{ lista_precios.valor_adulto }}</span></p>

<section class="container mx-auto px-4 py-16">
    <h2 class="text-3xl font-bold text-gray-800 mb-10 text-center">{{tour.nombre}}</h2>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        
        <div class="relative w-full h-100 rounded-2xl overflow-hidden group shadow-lg">
            
            <img src="{{ tour.imagen_principal.url }}" 
                class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">

            <div class="absolute inset-0 bg-black/40 group-hover:bg-black/20 transition-colors"></div>

            <div class="absolute inset-0 p-6 flex flex-col justify-between text-white">
                <h3 class="text-2xl font-bold mb-1">{{ tour.nombre }}</h3>
                
                <div class="flex justify-between items-center">
                    <span class="text-2xl font-black">${{ tour.precio.valor_adulto }}</span>
                    <a href="#" class="bg-orange-500 hover:bg-orange-600 px-4 py-2 rounded-lg font-bold transition">
                        VER TOUR
                    </a>
                </div>
            </div>
                
        </div>

    </div>
</section>
{% endblock %}
