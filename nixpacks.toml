[phases.setup]
nixPkgs = ["python311", "nodejs_22", "gcc", "postgresql"]

[phases.install]
cmds = [
    "npm install",
    "python -m venv venv",
    "./venv/bin/pip install --upgrade pip",
    "./venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = [
    "npm run build",
    "echo '--- BUSCANDO ARCHIVOS CRÍTICOS (CSS y JS) ---'",
    # Este comando busca main.css y main.js en todo el proyecto ignorando node_modules
    "find . -path './node_modules' -prune -o -name 'main.css' -print -o -name 'main.js' -print",
    "echo '--- RASTREO DE CARPETA STATIC ---'",
    "ls -R static",
    "echo '--- FIN DEL RASTREO ---'"
]

[start]
# Mantenemos el collectstatic aquí para ver si después del rastreo copia algo
cmd = "./venv/bin/python manage.py collectstatic --noinput && ./venv/bin/python manage.py migrate && ./venv/bin/python -m gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 600"