[phases.setup]
nixPkgs = ["python311", "nodejs_22", "gcc", "postgresql"]

[phases.install]
cmds = [
    "npm install",
    "python -m venv venv",
    "./venv/bin/pip install --upgrade pip",
    "./venv/bin/pip install -r requirements.txt",
    "pip list | grep jet"
]

[phases.build]
cmds = [
    "npm run build",
    "echo '--- CONTENIDO DE DIST DESPUÉS DEL BUILD ---'",
    "ls -R static/js/dist/assets",
    "mkdir -p staticfiles"
]

[start]
# Añadimos un chequeo de Django antes de arrancar
cmd = "./venv/bin/python manage.py collectstatic --noinput --clear && ./venv/bin/python manage.py migrate && ./venv/bin/python -m gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 600"