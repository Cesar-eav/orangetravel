# Le decimos a Railway: "Usa tus motores oficiales para Node y Python"
providers = ["node", "python"]

[phases.install]
# Instalamos Node primero y luego Python
cmds = [
    "npm install",
    "python -m pip install -r requirements.txt"
]

[phases.build]
# Construimos el frontend y luego los estáticos de Django
cmds = [
    "npm run build",
    "python manage.py collectstatic --noinput"
]