[phases.setup]
nixPkgs = ["python311", "nodejs_22", "gcc", "postgresql"]

[phases.install]
# Instalamos Node y creamos el entorno virtual LOCAL
cmds = [
    "npm install",
    "python -m venv venv",
    "./venv/bin/pip install --upgrade pip",
    "./venv/bin/pip install -r requirements.txt"
]

[phases.build]
# Generamos el CSS de Tailwind 4 y recolectamos estáticos usando el venv local
cmds = [
    "npm run build", 
    "ls -R static/js/dist", # Esto nos dirá en el log si Vite realmente creó los archivos,
    "./venv/bin/python manage.py collectstatic --noinput"
]

[start]
# Migraciones y arranque usando el venv local
cmd = "./venv/bin/python manage.py migrate && ./venv/bin/python -m gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 600"