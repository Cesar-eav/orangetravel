[phases.setup]
# Aquí está el secreto: pedimos Python Y su paquete de Pip por separado
nixPkgs = ["python311", "python311Packages.pip", "nodejs_22", "gcc", "postgresql"]

[phases.install]
# Ahora que Pip existe, podemos instalar todo
cmds = [
    "npm install",
    "pip install --upgrade pip",
    "pip install -r requirements.txt"
]

[phases.build]
# Construimos el frontend y los estáticos
cmds = [
    "npm run build",
    "python manage.py collectstatic --noinput"
]

[start]
# Comando de inicio limpio
cmd = "gunicorn config.wsgi --bind 0.0.0.0:$PORT --timeout 600"