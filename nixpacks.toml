[phases.setup]
nixPkgs = ["python311", "nodejs_22", "gcc", "postgresql"]

[phases.install]
# Instalamos dependencias de ambos mundos
cmds = [
    "npm install",
    "python -m venv /opt/venv",
    "/opt/venv/bin/pip install --upgrade pip",
    "/opt/venv/bin/pip install -r requirements.txt"
]

[phases.build]
# Generamos el CSS de Tailwind 4 y recolectamos estáticos
cmds = [
    "npm run build",
    "/opt/venv/bin/python manage.py collectstatic --noinput"
]

[start]
# IMPORTANTE: Agregamos :application para que Gunicorn encuentre la app
cmd = "/opt/venv/bin/python manage.py migrate && /opt/venv/bin/python -m gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 600"