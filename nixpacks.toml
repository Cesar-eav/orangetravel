[phases.setup]
nixPkgs = ["python311", "nodejs_22", "gcc", "postgresql"]

[phases.install]
# Creamos el entorno virtual y luego instalamos ahí dentro
cmds = [
    "npm install",
    "python -m venv /opt/venv",
    "/opt/venv/bin/pip install -r requirements.txt"
]

[phases.build]
# Usamos el python del entorno virtual para los comandos de Django
cmds = [
    "npm run build",
    "/opt/venv/bin/python manage.py collectstatic --noinput"
]

[start]
# Arrancamos Gunicorn usando el binario del entorno virtual
cmd = "/opt/venv/bin/python -m gunicorn config.wsgi --bind 0.0.0.0:$PORT --timeout 600"