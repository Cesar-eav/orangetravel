[phases.setup]
nixPkgs = ["python311", "nodejs_22", "gcc", "postgresql"]

[phases.install]
cmds = [
    "npm install",
    "python -m venv /opt/venv",
    "/opt/venv/bin/pip install -r requirements.txt"
]

[phases.build]
# Aquí es donde ocurre la magia del CSS
cmds = [
    "npm run build", 
    "/opt/venv/bin/python manage.py collectstatic --noinput"
]

[start]
# Agregamos :application para evitar el error 502
cmd = "/opt/venv/bin/python -m gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 600"